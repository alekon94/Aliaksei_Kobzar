<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        body.red {
            background-color: red;
        }
        body.blue {
            background-color: blue;
        }
        body.green {
            background-color: green;
        }
        body.orange {
            background-color: orange;
        }
        body.purple {
            background-color: purple;
        }
        body.black {
            background-color: black;
        }
    </style>
</head>
<body>
<select class="mySelect">
    <option>red</option>
    <option>green</option>
    <option>blue</option>
    <option>orange</option>
    <option>purple</option>
    <option>black</option>
</select>
<input type="submit" class="btn" value="Change color">
<script>
    function valcol() {
        let a = document.querySelector('.mySelect').value;
        return a;
    }
    function conf() {
        let col = valcol();
        document.body.className = col;
    }
    document.querySelector(".btn").onclick = conf;
</script>
</body>
</html>
