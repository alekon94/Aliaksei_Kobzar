<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<input type="text" class="myclass" value="white">
<input type="submit" class="btn" value="Change color">
<script>
    function valcol() {
        let a = document.querySelector('.myclass').value;
        return a;
    }
function conf() {
        let col = valcol();
        document.body.style.backgroundColor = col;
}
    document.querySelector(".btn").onclick = conf;
</script>
</body>
</html>
