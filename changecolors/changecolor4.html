<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        body {
            background-color: var(--main-color);
        }
    </style>
</head>
<body>
<input type="color" class="myclass" value="white">
<button onclick="conf(valcol());">Change</button>
<script>
    function valcol() {
        let a = document.querySelector('.myclass').value;
        return a;
    }
    function conf() {
        let color = valcol();
        document.body.style.setProperty('--main-color', color);
    }
    document.querySelector(".btn").onclick = conf();
</script>
</body>
</html>
