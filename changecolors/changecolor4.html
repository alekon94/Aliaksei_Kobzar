<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        body {
            background-color: var(--main-color);
        }
    </style>
</head>
<body>
<input type="color" class="myclass" value="white">
<input type="submit" class="btn" value="Change color">
<script>
    function valcol() {
        let a = document.querySelector('.myclass').value;
        return a;
    }
    function conf() {
        let col = valcol();
        document.body.style.backgroundColor = col;
    }
    document.querySelector(".btn").onclick = conf;
</script>
</body>
</html>
