<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        table {
            border-collapse: collapse;
        }

        td {
            border: 1px solid black;
            padding: 3px 5px;
        }
    </style>
</head>
<body>
<table>
    <tr><td>Пример</td></tr>
    <tr><td>Пример</td></tr>
    <tr><td>Пример</td></tr>
    <tr><td>Пример</td></tr>
    <tr><td>Пример</td></tr>
    <tr><td>Пример</td></tr>
    <tr><td>Пример</td></tr>
    <tr><td>Пример</td></tr>
</table>
<script>
    let tbl = document.body.firstElementChild;

    for (let i = 0; i < tbl.rows.length; i++) {
        if (i % 2 == 0){
            tbl.rows[i].style.backgroundColor = '#002D6D';
        }
    }
</script>
</body>
</html>
